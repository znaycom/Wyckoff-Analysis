name: Premarket Risk

on:
  schedule:
    # 北京时间 07:00（UTC+8）= UTC 前一日 23:00；为保证“北京时间周一到周五”触发，UTC 需配置为周日到周四
    # 目的：提前执行并尽量避开早高峰排队，给盘前风控留足缓冲时间
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

concurrency:
  group: premarket-risk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      PREMARKET_VIX_POLL_INTERVAL_SECONDS: "300"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Run premarket risk job
        run: |
          python -u scripts/premarket_risk_job.py --logs ${{ github.workspace }}/logs/premarket_risk.log \
            2>&1 | tee -a ${{ github.workspace }}/logs/premarket_risk.console.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: premarket-risk-logs-${{ github.run_number }}
          path: logs/premarket_risk*.log
          retention-days: 7
          if-no-files-found: warn
